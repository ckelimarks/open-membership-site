<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join — Membership Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-bg: #0a0e12;
            --dark-card: #12171d;
            --dark-border: rgba(255, 255, 255, 0.08);
            #6366f1: #6366f1;
            #8b5cf6: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-center;
            padding: 2rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(#6366f1), var(#8b5cf6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .description {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.0625rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        input[type="email"] {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: var(#6366f1);
            background: rgba(255, 255, 255, 0.05);
        }

        button {
            width: 100%;
            padding: 1.125rem;
            background: linear-gradient(135deg, var(#6366f1), var(#8b5cf6));
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1.0625rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 217, 255, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9375rem;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .back-link {
            display: block;
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 2rem;
            font-size: 0.9375rem;
        }

        .back-link:hover {
            color: var(#6366f1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Join</h1>
            <p class="description">
                Enter your email and we'll send you a magic link to sign in.
            </p>

            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                    />
                </div>

                <button type="submit" id="submitBtn">
                    Send Magic Link
                </button>
            </form>

            <div id="message"></div>

            <a href="/" class="back-link">← Back to home</a>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>

    <script>
        const form = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        // Check if already logged in
        (async () => {
            const user = await getCurrentUser();
            if (user) {
                window.location.href = '/feed.html';
            }
        })();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();

            // Clear previous messages
            messageDiv.innerHTML = '';
            messageDiv.className = 'message';

            // Disable form
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                await signInWithMagicLink(email);

                messageDiv.className = 'message success';
                messageDiv.textContent = `✓ Check your email! We sent a magic link to ${email}`;

                emailInput.value = '';
            } catch (error) {
                console.error('Auth error:', error);

                messageDiv.className = 'message error';
                messageDiv.textContent = error.message || 'Something went wrong. Please try again.';

                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Magic Link';
            }
        });
    </script>
</body>
</html>
