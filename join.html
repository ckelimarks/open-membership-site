<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join — YourBrand</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-bg: #0a0e12;
            --dark-card: #12171d;
            --dark-border: rgba(255, 255, 255, 0.08);
            #6366f1: #6366f1;
            #8b5cf6: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
            pointer-events: none;
            z-index: 1;
        }

        ::selection {
            background: var(#6366f1);
            color: var(--dark-bg);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1.25rem 3rem;
            backdrop-filter: blur(20px);
            background: rgba(10, 14, 18, 0.95);
            border-bottom: 1px solid var(--dark-border);
            position: relative;
            z-index: 10;
        }

        .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            position: relative;
            display: inline-block;
            width: 140px;
            height: 51px;
            cursor: pointer;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        /* Join Container */
        .join-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 2rem 4rem;
            position: relative;
            z-index: 10;
        }

        .join-content {
            max-width: 580px;
            width: 100%;
        }

        .join-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .join-title {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        .join-description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* What You Get */
        .what-you-get {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
        }

        .what-you-get h3 {
            font-size: 1.125rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .benefits-list {
            list-style: none;
            display: grid;
            gap: 0.875rem;
        }

        .benefits-list li {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.9375rem;
        }

        .benefits-list li::before {
            content: '✓';
            color: var(#6366f1);
            font-weight: 700;
            font-size: 1.125rem;
            flex-shrink: 0;
        }

        /* Form */
        .join-form {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            padding: 2.5rem;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .form-subtitle {
            font-size: 0.9375rem;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.625rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .currency-symbol {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.125rem;
            font-weight: 600;
            pointer-events: none;
        }

        input[type="number"],
        input[type="email"] {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid var(--dark-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1.125rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        input[type="number"] {
            padding-left: 2.5rem;
        }

        input[type="number"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: var(#6366f1);
            background: rgba(255, 255, 255, 0.05);
        }

        input[type="number"]::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .helper-text {
            font-size: 0.8125rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-style: italic;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(#6366f1), var(#8b5cf6));
            color: var(--dark-bg);
            border: none;
            padding: 1.125rem;
            border-radius: 12px;
            font-size: 1.0625rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 217, 255, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9375rem;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        /* Quick amounts */
        .quick-amounts {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .quick-amount {
            flex: 1;
            padding: 0.625rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .quick-amount:hover {
            border-color: var(#6366f1);
            color: var(--text-primary);
            background: rgba(0, 217, 255, 0.05);
        }

        /* Animated hands */
        .hand {
            position: fixed;
            top: -40%;
            width: 110vw;
            height: auto;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        .hand-left {
            left: -30vw;
            transform-origin: left center;
        }

        .hand-right {
            right: -30vw;
            transform-origin: right center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }

            .join-container {
                padding: 6rem 1.5rem 3rem;
            }

            .what-you-get,
            .join-form {
                padding: 2rem 1.5rem;
            }

            .hand {
                width: 120vw;
                top: 25%;
                opacity: 0.4;
            }

            .hand-left {
                left: -40vw;
            }

            .hand-right {
                right: -40vw;
            }
        }
    </style>
</head>
<body>
    <!-- Animated hands -->
    <img src="left.png" alt="" class="hand hand-left" id="handLeft">
    <img src="right.png" alt="" class="hand hand-right" id="handRight">

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='/home.html'">
                <img src="https://via.placeholder.com/200x80/0a0e12/00d9ff?text=Your+Logo" alt="YourBrand">
            </div>
            <a href="/home.html" class="back-link">← Back</a>
        </div>
    </nav>

    <div class="join-container">
        <div class="join-content">
            <!-- Header -->
            <div class="join-header">
                <h1 class="join-title">Pay What You Want</h1>
                <p class="join-description">
                    $0 for free access. Support the work if it moves you.
                </p>
            </div>

            <!-- Form -->
            <div class="join-form">
                <form id="joinForm">
                    <div class="form-group">
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Email"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input
                                type="number"
                                id="amount"
                                name="amount"
                                min="0"
                                step="1"
                                placeholder="0"
                                required
                            />
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        Continue
                    </button>
                </form>

                <div id="message"></div>
            </div>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>

    <script>
        const form = document.getElementById('joinForm');
        const amountInput = document.getElementById('amount');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        // Check if already logged in (skip redirect if upgrading)
        (async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isUpgrade = urlParams.get('upgrade') === 'true';

            if (!isUpgrade) {
                const user = await getCurrentUser();
                if (user) {
                    window.location.href = '/feed.html';
                }
            }
        })();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const amount = parseInt(amountInput.value) || 0;
            const email = emailInput.value.trim();

            // Clear previous messages
            messageDiv.innerHTML = '';
            messageDiv.className = 'message';

            // Validate amount
            if (amount > 0 && amount < 5) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Minimum $5 for paid support, or enter $0 for free access';
                return;
            }

            // Disable form
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                if (amount === 0) {
                    // Free tier - just create account
                    await signInWithMagicLink(email);

                    messageDiv.className = 'message success';
                    messageDiv.textContent = `✓ Check your email! We sent a magic link to ${email}`;

                    // Reset form
                    form.reset();
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Continue';

                } else {
                    // Paid tier - redirect to Stripe
                    const response = await fetch('/api/create-checkout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ amount, email })
                    });

                    const data = await response.json();

                    if (response.ok && data.url) {
                        // Redirect to Stripe Checkout
                        window.location.href = data.url;
                    } else {
                        throw new Error(data.error || 'Failed to create checkout session');
                    }
                }

            } catch (error) {
                console.error('Error:', error);

                messageDiv.className = 'message error';
                messageDiv.textContent = error.message || 'Something went wrong. Please try again.';

                submitBtn.disabled = false;
                submitBtn.textContent = 'Continue';
            }
        });

        // Scroll-based hand animation
        const handLeft = document.getElementById('handLeft');
        const handRight = document.getElementById('handRight');
        const joinForm = document.querySelector('.join-form');

        // Easing function for smooth deceleration
        function easeOutQuart(x) {
            return 1 - Math.pow(1 - x, 4);
        }

        function updateHandsPosition() {
            // Calculate progress based on form position
            const windowHeight = window.innerHeight;

            // Multiply by 4 to slow down the animation
            const targetScroll = (joinForm.offsetTop - (windowHeight / 2)) * 4;
            const scrollPercent = Math.max(0, Math.min(1, window.scrollY / targetScroll));

            // Apply easing - starts fast, slows down as it approaches 1
            const easedProgress = easeOutQuart(scrollPercent);

            // Maximum distance they can travel before touching
            const maxDistance = 23;
            const distance = easedProgress * maxDistance;

            handLeft.style.transform = `translateX(${distance}vw)`;
            handRight.style.transform = `translateX(-${distance}vw)`;
        }

        // Listen to scroll events
        window.addEventListener('scroll', updateHandsPosition, { passive: true });
        window.addEventListener('resize', updateHandsPosition, { passive: true });

        // Initial position
        updateHandsPosition();
    </script>
    <!-- Breathing Component -->
</body>
</html>
