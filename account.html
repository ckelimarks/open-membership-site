<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account — YourBrand</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-bg: #0a0e12;
            --dark-card: #12171d;
            --dark-border: rgba(255, 255, 255, 0.08);
            #6366f1: #6366f1;
            #8b5cf6: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
            pointer-events: none;
            z-index: 1;
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 1.25rem 3rem;
            backdrop-filter: blur(20px);
            background: rgba(10, 14, 18, 0.95);
            border-bottom: 1px solid var(--dark-border);
            position: relative;
            z-index: 10;
        }
        .nav-container {
            max-width: 1600px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            position: relative;
            display: inline-block;
            width: 140px;
            height: 51px;
            cursor: pointer;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none;
            font-weight: 500; transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--text-primary); }
        .account-container {
            min-height: 100vh; padding: 8rem 2rem 4rem;
            max-width: 700px; margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        .account-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem; font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .account-email {
            color: var(--text-secondary);
            font-size: 1.1rem; margin-bottom: 3rem;
        }
        .card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px; padding: 2.5rem;
            margin-bottom: 1.5rem;
        }
        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem; font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--dark-border);
        }
        .info-row {
            display: flex; justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--dark-border);
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-muted); }
        .info-value { font-weight: 600; }
        .tier-badge {
            background: linear-gradient(135deg, var(#6366f1), var(#8b5cf6));
            color: var(--dark-bg); padding: 0.375rem 1rem;
            border-radius: 50px; font-size: 0.875rem;
            font-weight: 700; text-transform: uppercase;
        }
        .tier-badge.free {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        .btn {
            display: inline-block; padding: 0.875rem 1.75rem;
            border-radius: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            border: none; font-family: 'Inter', sans-serif;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(#6366f1), var(#8b5cf6));
            color: var(--dark-bg);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dark-border);
            color: var(--text-primary);
        }
        .btn-group { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .loading { text-align: center; padding: 3rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='/'">
                <img src="https://via.placeholder.com/200x80/0a0e12/00d9ff?text=Your+Logo" alt="YourBrand">
            </div>
            <div class="nav-links">
                <a href="/feed.html">Feed</a>
                <a href="/about.html">About</a>
                <a href="/account.html">Account</a>
            </div>
        </div>
    </nav>

    <div class="account-container">
        <h1 class="account-title">Account</h1>
        <p class="account-email" id="userEmail">Loading...</p>
        <div id="accountContent" class="loading">Loading account details...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        (async () => {
            const user = await requireAuth();
            if (!user) return;

            document.getElementById('userEmail').textContent = user.email;

            const memberSince = new Date(user.created_at).toLocaleDateString('en-US', {
                month: 'long', day: 'numeric', year: 'numeric'
            });

            // Check subscription status from user metadata
            const subscriptionTier = user.user_metadata?.subscription_tier || 'free';
            const subscriptionStatus = user.user_metadata?.subscription_status;
            const isSubscriber = subscriptionTier === 'supporter' && subscriptionStatus === 'active';

            document.getElementById('accountContent').innerHTML = `
                <div class="card">
                    <h2 class="card-title">Membership</h2>
                    <div class="info-row">
                        <span class="info-label">Status</span>
                        <span class="tier-badge ${isSubscriber ? '' : 'free'}">
                            ${isSubscriber ? 'Supporter' : 'Free'}
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Member Since</span>
                        <span class="info-value">${memberSince}</span>
                    </div>
                    ${isSubscriber ? `
                    <div class="info-row">
                        <span class="info-label">Monthly Support</span>
                        <span class="info-value">$10/month</span>
                    </div>
                    ` : ''}
                    <div class="btn-group">
                        ${isSubscriber ? `
                        <button class="btn btn-secondary" onclick="manageBilling()">
                            Manage Billing
                        </button>
                        ` : `
                        <button class="btn btn-primary" onclick="window.location.href='/join.html?upgrade=true'">
                            Become a Supporter
                        </button>
                        `}
                    </div>
                </div>
                
                <div class="card">
                    <h2 class="card-title">Account Settings</h2>
                    <div class="btn-group">
                        <button class="btn btn-secondary" onclick="signOut()">Sign Out</button>
                    </div>
                </div>
            `;
        })();

        function manageBilling() {
            // TODO: Stripe Customer Portal
            alert('Redirect to Stripe customer portal');
        }
    </script>
    <!-- Breathing Component -->
</body>
</html>
